name: Lint, Fix & Test

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  # ── Job 1: Lint & Auto-fix ────────────────────────────────────────────────
  lint-fix:
    name: Lint & Auto-fix Codebase
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── Node.js ─────────────────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Node dependencies
        run: |
          npm install --global \
            eslint \
            @eslint/js \
            prettier \
            stylelint \
            stylelint-config-standard \
            htmlhint

      # ── PHP tooling ─────────────────────────────────────────────────────────
      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          tools: cs2pr, php-cs-fixer

      # ── ESLint ──────────────────────────────────────────────────────────────
      - name: ESLint — lint & auto-fix JS
        run: |
          if [ ! -f eslint.config.js ] && [ ! -f eslint.config.mjs ] && [ ! -f .eslintrc* ]; then
            cat > eslint.config.js << 'EOF'
          import js from "@eslint/js";
          export default [
            js.configs.recommended,
            {
              rules: {
                "no-unused-vars": "warn",
                "no-console": "off",
                semi: ["error", "always"],
                quotes: ["error", "double"],
              },
            },
          ];
          EOF
          fi
          eslint "**/*.js" --fix --ignore-pattern "node_modules/" --ignore-pattern "vendor/" || true

      # ── Stylelint ───────────────────────────────────────────────────────────
      - name: Stylelint — lint & auto-fix CSS
        run: |
          if [ ! -f .stylelintrc* ] && [ ! -f stylelint.config* ]; then
            cat > .stylelintrc.json << 'EOF'
          {
            "extends": ["stylelint-config-standard"],
            "rules": {
              "color-hex-length": "short",
              "declaration-block-trailing-semicolon": "always"
            }
          }
          EOF
          fi
          stylelint "**/*.css" --fix --ignore-path .gitignore || true

      # ── HTMLHint ────────────────────────────────────────────────────────────
      - name: HTMLHint — lint HTML
        run: |
          if [ ! -f .htmlhintrc ]; then
            cat > .htmlhintrc << 'EOF'
          {
            "tagname-lowercase": true,
            "attr-lowercase": true,
            "attr-value-double-quotes": true,
            "doctype-first": true,
            "tag-pair": true,
            "spec-char-escape": true,
            "id-unique": true,
            "src-not-empty": true,
            "title-require": true
          }
          EOF
          fi
          htmlhint "**/*.html" --ignore "node_modules/**,vendor/**" || true

      # ── Prettier ────────────────────────────────────────────────────────────
      - name: Prettier — format HTML, CSS & JS
        run: |
          if [ ! -f .prettierrc* ] && [ ! -f prettier.config* ]; then
            cat > .prettierrc.json << 'EOF'
          {
            "printWidth": 100,
            "tabWidth": 2,
            "useTabs": false,
            "semi": true,
            "singleQuote": false,
            "trailingComma": "es5",
            "bracketSpacing": true,
            "htmlWhitespaceSensitivity": "css"
          }
          EOF
          fi
          prettier --write "**/*.{html,css,js}" \
            --ignore-path .gitignore \
            --ignore-unknown \
            2>/dev/null || true

      # ── PHP-CS-Fixer ────────────────────────────────────────────────────────
      - name: PHP-CS-Fixer — lint & auto-fix PHP
        run: |
          if [ ! -f .php-cs-fixer.php ] && [ ! -f .php-cs-fixer.dist.php ]; then
            cat > .php-cs-fixer.dist.php << 'EOF'
          <?php
          $finder = PhpCsFixer\Finder::create()
              ->in(__DIR__)
              ->exclude(['vendor', 'node_modules']);

          return (new PhpCsFixer\Config())
              ->setRules([
                  '@PSR12'                    => true,
                  'array_syntax'              => ['syntax' => 'short'],
                  'no_unused_imports'         => true,
                  'ordered_imports'           => true,
                  'single_quote'              => true,
                  'trailing_comma_in_multiline' => true,
              ])
              ->setFinder($finder);
          EOF
          fi
          php-cs-fixer fix --allow-risky=yes || true

      # ── Commit auto-fixed changes ────────────────────────────────────────────
      - name: Commit auto-fix changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "ci: auto-fix lint issues [skip ci]"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"

  # ── Job 2: Jest Tests ─────────────────────────────────────────────────────
  test:
    name: Run Jest Tests
    runs-on: ubuntu-latest
    # Run tests after linting so the working tree is clean
    needs: lint-fix

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: packages.json

      # Install jest locally from packages.json
      - name: Install dependencies
        run: npm install --prefix . --package-lock=false
        working-directory: .
        env:
          NPM_CONFIG_PACKAGE_JSON: packages.json

      - name: Run Jest tests
        run: npx jest --ci --verbose --config jest.config.js

      - name: Upload coverage report (optional)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jest-coverage
          path: coverage/
          if-no-files-found: ignore
